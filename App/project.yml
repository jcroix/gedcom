# project.yml — XcodeGen spec for the GedReader macOS app.
#
# Run `xcodegen generate` in this directory to (re)create GedReader.xcodeproj. The .xcodeproj is a
# build artifact derived from THIS file — edit the spec here, never the generated project. The app
# target is a thin SwiftUI shell; all testable logic lives in the GedReaderCore SPM library (in the
# root package, one directory up), which this app links alongside the GedcomKit engine.
#
# Notes:
#   * deploymentTarget macOS 14 — required by @Observable (DocumentModel).
#   * The local package at ".." provides both products: GedcomKit (engine) + GedReaderCore (logic).
#   * CODE_SIGN_IDENTITY "-" = ad-hoc signing (no Developer cert is available in this environment).
#   * App target uses Swift 5 language mode to keep early SwiftUI view code free of Swift-6
#     strict-concurrency churn; the engine + core libraries remain Swift 6.

name: GedReader

options:
  bundleIdPrefix: com.jcroix
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  GedcomKit:
    path: ..

targets:
  GedReader:
    type: application
    platform: macOS
    sources:
      - path: GedReader
    dependencies:
      - package: GedcomKit
        product: GedcomKit
      - package: GedcomKit
        product: GedReaderCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jcroix.GedReader
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
